<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>Update Vehicle Details</h3>
                    </div>
                    <div class="card-body">
                        
                        <form action="/update/{{ vehicle.id }}" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Vehicle Number</label>
                                <input type="text" class="form-control" name="vehicle_no" value="{{ vehicle.vehicle_no }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Owner ID</label>
                                <input type="text" class="form-control" name="owner_id" value="{{ vehicle.owner_id }}" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">Save Changes</button>
                                <a href="/" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
